<html>
  <head>
    <title> Terrário - experiência de RA.js usando um novo marcador e um modelo do A-frame</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
      
  <body style="margin: 0px; overflow: hidden">
      <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
 <a-marker present="hiro">
         <a-image src="terrário - realidade aumentada.png" position="0 0.5 0" rotation="-90 0 0" width="9" height="16"></a-image>
        </a-marker>
        <a-entity camera><a-entity>
      </a-scene>
  </body>
    
</html>
